# =====================================================
# Team Portfolio — Spring Boot Application Properties
# =====================================================

# Server Configuration
server.port=8080

# -------------------------------------------------------
# H2 In-Memory Database (Development / No MySQL required)
# The H2 console is available at http://localhost:8080/h2-console
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:team_portfolio_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (browser UI to inspect the in-memory DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------------------------------------
# JPA / Hibernate Configuration
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -------------------------------------------------------
# PRODUCTION: Switch to MySQL by uncommenting below
# and commenting out the H2 block above.
# -------------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/team_portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.com.teamportfolio=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# -------------------------------------------------------
# Jackson JSON Configuration
# -------------------------------------------------------
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=non_null

# -------------------------------------------------------
# Spring MVC — Serve static files from root classpath
# -------------------------------------------------------
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
